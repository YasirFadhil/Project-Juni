<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pekerjaanmu Nanti - Kuis Penentu Karir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
        background: #09090b;
      }
      .font-heading {
        font-family: "Outfit", sans-serif;
      }
      .option-btn {
        background: #18181b;
        border: 1px solid #27272a;
        transition: all 0.2s;
      }
      .option-btn:hover {
        border-color: #a855f7;
        background: rgba(168, 85, 247, 0.05);
      }
    </style>
  </head>
  <body class="text-stone-200 min-h-screen flex flex-col">
    <nav
      class="p-4 border-b border-stone-800 bg-stone-950 flex justify-between items-center"
    >
      <button
        onclick="window.location.href = 'dashboard.html'"
        class="text-xs font-bold text-stone-400 hover:text-white bg-stone-900 border border-stone-800 px-3 py-1.5 rounded-lg transition-colors"
      >
        ← Dashboard
      </button>
      <div
        class="text-xs font-heading font-black tracking-widest text-purple-400"
      >
        FUTURE CAREER QUIZ
      </div>
      <div class="w-8"></div>
    </nav>

    <main class="flex-1 flex flex-col justify-center items-center p-4">
      <div class="w-full max-w-lg">
        <div
          id="quiz-card"
          class="bg-stone-950 border border-stone-800 rounded-3xl p-6 md:p-8 shadow-2xl"
        >
          <div
            class="w-full bg-stone-900 h-2 rounded-full overflow-hidden mb-6"
          >
            <div
              id="progress-bar"
              class="bg-purple-500 h-full transition-all"
              style="width: 33%"
            ></div>
          </div>

          <h2
            id="question-text"
            class="font-heading text-xl md:text-2xl font-black text-white leading-snug mb-6"
          >
            Loading pertanyaan...
          </h2>

          <div id="options-container" class="space-y-3"></div>
        </div>

        <div
          id="result-card"
          class="hidden bg-stone-950 border-2 border-purple-500/30 rounded-3xl p-8 text-center shadow-2xl"
        >
          <div class="text-5xl mb-4">🏆</div>
          <p
            class="text-xs text-purple-400 font-bold uppercase tracking-widest"
          >
            Kecocokan Karir Lu Adalah:
          </p>
          <h2
            id="result-title"
            class="font-heading text-3xl font-black text-white mt-1"
          >
            Social Media Strategist
          </h2>
          <p
            id="result-desc"
            class="text-sm text-stone-400 mt-3 px-4 leading-relaxed"
          >
            Lu suka berekspresi lewat konten visual dan interaksi digital
            langsung!
          </p>

          <button
            onclick="location.reload()"
            class="mt-8 font-heading font-bold bg-stone-900 border border-stone-700 hover:border-purple-500 text-white px-6 py-3 rounded-xl text-xs transition-colors"
          >
            Ulangi Kuis
          </button>
        </div>
      </div>
    </main>

    <script>
      const questions = [
        {
          q: "Apa rutinitas digital yang paling bikin lu tertarik seharian?",
          options: [
            {
              text: "Ngepoin tren video TikTok / Reels terbaru buat bikin konsep konten unik.",
              score: "creative",
            },
            {
              text: "Menganalisis grafik performa, statistik views, dan data algoritma.",
              score: "data",
            },
            {
              text: "Ngebales chat, dengerin curhatan/komplainan orang, nyelesaiin masalah.",
              score: "crm",
            },
          ],
        },
        {
          q: "Kalau disuruh bikin strategi jualan produk sepatu lokal, langkah pertama lu?",
          options: [
            {
              text: "Bikin copywriting story-telling estetik yang bikin orang emosional.",
              score: "creative",
            },
            {
              text: "Pasang target ads pake demografi ketat biar konversi penjualan maksimal.",
              score: "data",
            },
            {
              text: "Bikin program loyalitas diskon khusus member lama biar mereka beli lagi.",
              score: "crm",
            },
          ],
        },
        {
          q: "Kelebihan utama diri lu yang sering diakui orang lain?",
          options: [
            {
              text: "Punya selera visual tinggi dan selalu out of the box.",
              score: "creative",
            },
            {
              text: "Logis, teliti, suka hitungan logis dan ga gampang kemakan asumsi.",
              score: "data",
            },
            {
              text: "Komunikatif, sabar banget, dan gampang bikin orang lain percaya.",
              score: "crm",
            },
          ],
        },
      ];

      let currentStep = 0;
      let scores = { creative: 0, data: 0, crm: 0 };

      function loadQuestion() {
        if (currentStep >= questions.length) {
          showResult();
          return;
        }

        document.getElementById("progress-bar").style.width =
          `${((currentStep + 1) / questions.length) * 100}%`;

        const currentQ = questions[currentStep];
        document.getElementById("question-text").textContent = currentQ.q;

        const container = document.getElementById("options-container");
        container.innerHTML = "";

        currentQ.options.forEach((opt) => {
          const btn = document.createElement("button");
          btn.className =
            "option-btn w-full text-left px-5 py-4 rounded-xl text-sm font-medium text-stone-300 transform active:scale-[0.99] transition-all";
          btn.textContent = opt.text;
          btn.onclick = () => {
            scores[opt.score]++;
            currentStep++;
            loadQuestion();
          };
          container.appendChild(btn);
        });
      }

      function showResult() {
        document.getElementById("quiz-card").classId = "hidden";
        document.getElementById("quiz-card").style.display = "none";

        const resultCard = document.getElementById("result-card");
        resultCard.classList.remove("hidden");

        let highest = "creative";
        if (scores.data > scores.creative) highest = "data";
        if (scores.crm > scores[highest]) highest = "crm";

        const titles = {
          creative: "Content & Social Media Strategist",
          data: "Growth & Digital Ads Specialist",
          crm: "Customer Relationship & Community Manager",
        };

        const descs = {
          creative:
            "Lu sangat cocok menguasai panggung kreatif digital, merancang copywriting, feed estetik, dan video viral penarik massa produk.",
          data: "Otak kanan lu kuat di analytical data. Lu cocok ngurus target budgeting iklan berbayar (FB Ads, Google Ads) serta optimasi konversi penjualan pasar.",
          crm: "Kekuatan lu ada di empati dan retensi pembeli. Lu cocok jadi garda depan yang menjaga kepuasan konsumen purna jual serta membangun loyalty loop bisnis.",
        };

        document.getElementById("result-title").textContent = titles[highest];
        document.getElementById("result-desc").textContent = descs[highest];
      }

      window.onload = loadQuestion;
    </script>
  </body>
</html>
