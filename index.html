<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intro - Selamat Datang di Madani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
        background: radial-gradient(circle at center, #1a102f, #09090b 90%);
      }
      .font-heading {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body
    class="text-stone-200 min-h-screen flex flex-col justify-center items-center p-4"
  >
    <div
      class="max-w-md w-full bg-stone-950/80 border border-stone-900 p-8 rounded-3xl shadow-2xl backdrop-blur-md text-center"
    >
      <div class="text-4xl mb-4">🚀</div>
      <h1
        class="font-heading text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 uppercase tracking-tight"
      >
        Edu-Tech Marketing
      </h1>
      <p class="text-xs text-stone-500 mt-2">
        Platform interaktif pemetaan profil & peluang usaha pemasaran digital.
      </p>

      <div class="mt-8 text-left space-y-2">
        <label
          class="text-[11px] font-bold text-stone-400 uppercase tracking-wider pl-1"
          >Masukkan Nama Lu, Jirr:</label
        >
        <input
          type="text"
          id="username-input"
          placeholder="Contoh: Fathir Bima"
          class="w-full bg-stone-900 border border-stone-800 focus:border-cyan-500 px-4 py-3.5 rounded-xl text-sm text-white placeholder-stone-600 focus:outline-none transition-all"
        />
      </div>

      <button
        onclick="saveAndStart()"
        class="mt-6 w-full font-heading font-black bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-cyan-400 hover:to-purple-500 text-stone-950 py-4 rounded-xl text-xs tracking-widest uppercase transition-all shadow-lg shadow-cyan-500/10 active:scale-95"
      >
        Mulai Petualangan →
      </button>
    </div>

    <script {__id__="auth-engine" }>
      function saveAndStart() {
        const nameField = document.getElementById("username-input").value;

        if (nameField.trim() === "") {
          alert("Nama jangan dikosongin asu, masukin dulu jirr! 💀");
          return;
        }

        // SIMPEN DATA NAMA KE LOCALSTORAGE BROWSER
        localStorage.setItem("username", nameField.trim());

        // LANGSUNG LEMPAR KE DASHBOARD Utama
        window.location.href = "dashboard.html";
      }
    </script>
  </body>
</html>
